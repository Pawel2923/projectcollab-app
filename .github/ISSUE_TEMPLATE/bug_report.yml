name: Bug Report
description: Create a report to help us improve ProjectCollab
title: '[BUG] '
labels: ['bug']
assignees: ''

body:
  - type: markdown
    attributes:
      value: Thank you for taking the time to report a bug!
  - type: textarea
    id: summary
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Container / Server Logs
      description: Include relevant Docker logs (`docker compose logs api` or `docker compose logs frontend`).
      render: shell
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Development (docker compose up)
        - Production (docker compose -f compose.prod.yaml up)
        - Remote Dev / Dev Container
    validations:
      required: true
