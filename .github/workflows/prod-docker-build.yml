name: Build and Push Production Compose

on:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-stack:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Recreate .env.prod.local file
      run: |
        echo "${{ secrets.PROD_ENV_FILE }}" > .env.prod.local

    - name: Build production images
      env:
        IMAGES_TAG: ${{ github.sha }}

      run:
        docker compose -f compose.yaml -f compose.prod.yaml --env-file .env.prod.local build --no-cache

    - name: Tag images as latest
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        PREFIX=$(grep '^IMAGES_PREFIX=' .env.prod.local | cut -d'=' -f2)
        docker tag "$PREFIX/projectcollab-frontend:${{ github.sha }}" "$PREFIX/projectcollab-frontend:latest"
        docker tag "$PREFIX/projectcollab-api:${{ github.sha }}" "$PREFIX/projectcollab-api:latest"

    - name: Push images to Docker Hub
      env:
        IMAGES_TAG: ${{ github.sha }}
      run: |
        docker compose -f compose.yaml -f compose.prod.yaml --env-file .env.prod.local push
        IMAGES_TAG=latest docker compose -f compose.yaml -f compose.prod.yaml --env-file .env.prod.local push
