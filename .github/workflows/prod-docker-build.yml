name: Build and Push Production Compose

on:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-stack:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Recreate .env.prod.local file
      run: |
        echo "${{ secrets.PROD_ENV_FILE }}" > .env.prod.local

    - name: Build production images
      env:
        IMAGES_TAG: ${{ github.sha }}

      run:
        docker compose -f compose.yaml -f compose.prod.yaml --env-file .env.prod.local build --no-cache

    - name: Tag images as latest
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        for service in $(docker compose -f compose.yaml -f compose.prod.yaml --env-file .env.prod.local config --format json | jq -r '.services | to_entries[] | select(.value.build != null) | .key'); do
          SHA_IMAGE=$(IMAGES_TAG=$IMAGES_TAG docker compose -f compose.yaml -f compose.prod.yaml --env-file .env.prod.local config --images --services $service)
          LATEST_IMAGE=$(IMAGES_TAG=latest docker compose -f compose.yaml -f compose.prod.yaml --env-file .env.prod.local config --images --services $service)
          
          echo "Mapping $SHA_IMAGE ---> $LATEST_IMAGE"
          docker tag "$SHA_IMAGE" "$LATEST_IMAGE"
        done

    - name: Push images to Docker Hub
      env:
        IMAGES_TAG: ${{ github.sha }}
      run: |
        docker compose -f compose.yaml -f compose.prod.yaml --env-file .env.prod.local push
        IMAGES_TAG=latest docker compose -f compose.yaml -f compose.prod.yaml --env-file .env.prod.local push
